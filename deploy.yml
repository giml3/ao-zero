---
- name: Deploy AO - The Overgod Locally
  hosts: localhost
  connection: local
  # Removed global 'become: yes' to prevent sudo prompts on macOS for docker commands
  vars:
    project_dir: "{{ ansible_env.PWD }}"
    ollama_model: "llama3"

  tasks:
    - name: Ensure Docker is installed (Linux only)
      package:
        name: docker.io
        state: present
      become: yes
      when: ansible_os_family == "Debian"

    - name: Ensure Docker Compose is installed (Linux only)
      package:
        name: docker-compose
        state: present
      become: yes
      when: ansible_os_family == "Debian"

    - name: Ensure Docker service is started (Linux only)
      service:
        name: docker
        state: started
        enabled: yes
      become: yes
      when: ansible_os_family == "Debian" or ansible_os_family == "RedHat"

    - name: Build and start containers with Docker Compose
      community.docker.docker_compose_v2:
        project_src: "{{ project_dir }}"
        state: present
        build: always
      register: output

    - name: Show Docker Compose output
      debug:
        var: output

    - name: Wait for Ollama to be ready
      uri:
        url: "http://localhost:11434/api/tags"
        status_code: 200
      register: ollama_status
      until: ollama_status.status == 200
      retries: 10
      delay: 5

    - name: Pull the local model in Ollama
      command: "docker compose -f {{ project_dir }}/docker-compose.yml exec -T ollama ollama pull {{ ollama_model }}"
      ignore_errors: yes

    - name: Deployment Summary
      debug:
        msg: "AO is manifest at http://localhost:3000. Consult the Overgod wisely."
